rest:
  ssl: false
  host: localhost
  port: 8080
  nameSpace: /server

info:
  enableCOARNotifySupport: false

themes:
  - name: custom
    headTags:
    - tagName: link
      attributes:
        rel: icon
        href: assets/images/uist-favicon.png
        type: image/png

addToAnyPlugin:
  socialNetworksEnabled: false
  scriptUrl: "https://static.addtoany.com/menu/page.js"
  buttons:
    - facebook
    - twitter
    - linkedin
    - email
    - copy_link
  showPlusButton: true
  showCounters: true
  title: UIST Digital Repository
